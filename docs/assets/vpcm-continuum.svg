<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VPCM credibility continuum</title>
  <desc id="desc">A clean continuum showing how VPCM moves from observational data to interventional support, refusal-aware prediction, calibrated reports, and regulatory evidence.</desc>
  <defs>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #162033; font-size: 44px; font-weight: 760; letter-spacing: 0; }
      .subtitle { fill: #516073; font-size: 21px; font-weight: 440; letter-spacing: 0; }
      .stage { fill: #172238; font-size: 22px; font-weight: 720; letter-spacing: 0; }
      .caption { fill: #59687B; font-size: 17px; font-weight: 440; letter-spacing: 0; }
      .axis { stroke: #2F6F73; stroke-width: 8; stroke-linecap: round; }
      .tick { stroke: #2F6F73; stroke-width: 3; stroke-linecap: round; }
      .fine { stroke: #D8E1E8; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1400" height="560" fill="#FFFFFF"/>
  <rect x="60" y="52" width="1280" height="456" rx="18" fill="#F7F9FB" stroke="#D8E1E8"/>

  <text x="100" y="116" class="sans title">VPCM credibility continuum</text>
  <text x="100" y="152" class="sans subtitle">Evidence flow from observational biology to a signed causal estimate or an explicit refusal.</text>
  <text x="1140" y="116" text-anchor="end" class="sans subtitle">lysyloxidase</text>

  <line x1="150" y1="290" x2="1250" y2="290" class="axis"/>
  <path d="M1232 270L1254 290L1232 310" stroke="#2F6F73" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="sans">
    <line x1="150" y1="248" x2="150" y2="332" class="tick"/>
    <circle cx="150" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="150" y="214" text-anchor="middle" class="stage">Observational data</text>
    <text x="150" y="362" text-anchor="middle" class="caption">CELLxGENE, HCA</text>
    <text x="150" y="386" text-anchor="middle" class="caption">patient atlas context</text>

    <line x1="370" y1="248" x2="370" y2="332" class="tick"/>
    <circle cx="370" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="370" y="214" text-anchor="middle" class="stage">Interventional anchors</text>
    <text x="370" y="362" text-anchor="middle" class="caption">Perturb-seq, sci-Plex</text>
    <text x="370" y="386" text-anchor="middle" class="caption">LINCS, Tahoe-100M</text>

    <line x1="590" y1="248" x2="590" y2="332" class="tick"/>
    <circle cx="590" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="590" y="214" text-anchor="middle" class="stage">Support decision</text>
    <text x="590" y="362" text-anchor="middle" class="caption">Mahalanobis OOD gate</text>
    <text x="590" y="386" text-anchor="middle" class="caption">refuse outside support</text>

    <line x1="810" y1="248" x2="810" y2="332" class="tick"/>
    <circle cx="810" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="810" y="214" text-anchor="middle" class="stage">Perturbation estimate</text>
    <text x="810" y="362" text-anchor="middle" class="caption">ensemble prediction</text>
    <text x="810" y="386" text-anchor="middle" class="caption">mean and ridge controls</text>

    <line x1="1030" y1="248" x2="1030" y2="332" class="tick"/>
    <circle cx="1030" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="1030" y="214" text-anchor="middle" class="stage">Calibrated report</text>
    <text x="1030" y="362" text-anchor="middle" class="caption">conformal intervals</text>
    <text x="1030" y="386" text-anchor="middle" class="caption">mechanism and outcomes</text>

    <line x1="1250" y1="248" x2="1250" y2="332" class="tick"/>
    <circle cx="1250" cy="290" r="12" fill="#FFFFFF" stroke="#2F6F73" stroke-width="5"/>
    <text x="1250" y="214" text-anchor="middle" class="stage">Regulatory evidence</text>
    <text x="1250" y="362" text-anchor="middle" class="caption">V&amp;V 40, FDA 7-step</text>
    <text x="1250" y="386" text-anchor="middle" class="caption">signed audit trail</text>
  </g>

  <line x1="150" y1="448" x2="1250" y2="448" class="fine"/>
  <text x="150" y="480" class="sans caption">p(Y | X): representation and retrieval</text>
  <text x="1250" y="480" text-anchor="end" class="sans caption">p(Y | do(X)): causal estimate only when support is adequate</text>
</svg>

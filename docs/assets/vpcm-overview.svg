<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VPCM architecture overview</title>
  <desc id="desc">A layered overview of the Virtual Patient Cell Model pipeline from harmonized data through causal refusal, uncertainty, outcome prediction, and regulatory evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111F"/>
      <stop offset="0.46" stop-color="#10283A"/>
      <stop offset="1" stop-color="#151B2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="110" y1="110" x2="1290" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#69E3C4"/>
      <stop offset="0.48" stop-color="#7FB7FF"/>
      <stop offset="1" stop-color="#F3C76B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17364A"/>
      <stop offset="1" stop-color="#1D2440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #EEF7FF; }
      .muted { fill: #A9BED2; }
      .tiny { font-size: 20px; }
      .small { font-size: 24px; }
      .mid { font-size: 32px; font-weight: 700; }
      .title { font-size: 76px; font-weight: 800; letter-spacing: 0; }
      .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>
  <rect width="1400" height="720" rx="0" fill="url(#bg)"/>
  <path d="M90 604C252 489 359 553 493 412C636 262 763 281 907 190C1067 88 1196 111 1310 171" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.58"/>
  <path d="M96 612C288 542 409 596 548 475C693 348 811 392 947 301C1091 204 1200 236 1302 298" stroke="#69E3C4" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

  <text x="92" y="112" class="label title">VPCM</text>
  <text x="96" y="154" class="label small muted">Virtual Patient Cell Model by lysyloxidase</text>
  <text x="96" y="202" class="label mid">Patient-specific perturbation prediction with explicit causal refusal</text>

  <g filter="url(#shadow)">
    <rect x="92" y="270" width="186" height="220" rx="18" fill="url(#panel)" stroke="#5CE0C2" stroke-opacity="0.52"/>
    <rect x="315" y="270" width="186" height="220" rx="18" fill="url(#panel)" stroke="#7FB7FF" stroke-opacity="0.52"/>
    <rect x="538" y="270" width="186" height="220" rx="18" fill="url(#panel)" stroke="#F3C76B" stroke-opacity="0.52"/>
    <rect x="761" y="270" width="186" height="220" rx="18" fill="url(#panel)" stroke="#E78AEF" stroke-opacity="0.52"/>
    <rect x="984" y="270" width="186" height="220" rx="18" fill="url(#panel)" stroke="#69E3C4" stroke-opacity="0.52"/>
    <rect x="1207" y="270" width="102" height="220" rx="18" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.34"/>
  </g>

  <text x="122" y="326" class="label mid">Data</text>
  <text x="122" y="366" class="label tiny muted">20 resources</text>
  <text x="122" y="398" class="label tiny muted">ID harmonization</text>
  <text x="122" y="430" class="label tiny muted">QC + provenance</text>

  <text x="345" y="326" class="label mid">Models</text>
  <text x="345" y="366" class="label tiny muted">5 single-cell FMs</text>
  <text x="345" y="398" class="label tiny muted">Mean + ridge</text>
  <text x="345" y="430" class="label tiny muted">5 perturbation heads</text>

  <text x="568" y="326" class="label mid">Causal</text>
  <text x="568" y="366" class="label tiny muted">Support manifold</text>
  <text x="568" y="398" class="label tiny muted">Mahalanobis gate</text>
  <text x="568" y="430" class="label tiny muted">Refuse OOD do(X)</text>

  <text x="791" y="326" class="label mid">UQ</text>
  <text x="791" y="366" class="label tiny muted">Split conformal</text>
  <text x="791" y="398" class="label tiny muted">Mondrian groups</text>
  <text x="791" y="430" class="label tiny muted">Patient LoRA</text>

  <text x="1014" y="326" class="label mid">Reports</text>
  <text x="1014" y="366" class="label tiny muted">Mechanism</text>
  <text x="1014" y="398" class="label tiny muted">Biomarkers</text>
  <text x="1014" y="430" class="label tiny muted">Outcomes</text>

  <text x="1234" y="326" class="label mid">FDA</text>
  <text x="1234" y="366" class="label tiny muted">V&amp;V 40</text>
  <text x="1234" y="398" class="label tiny muted">7-step</text>
  <text x="1234" y="430" class="label tiny muted">Type C</text>

  <g stroke="#D9ECFF" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M278 380H314"/>
    <path d="M501 380H537"/>
    <path d="M724 380H760"/>
    <path d="M947 380H983"/>
    <path d="M1170 380H1206"/>
    <path d="M303 368L315 380L303 392"/>
    <path d="M526 368L538 380L526 392"/>
    <path d="M749 368L761 380L749 392"/>
    <path d="M972 368L984 380L972 392"/>
    <path d="M1195 368L1207 380L1195 392"/>
  </g>

  <rect x="92" y="544" width="1217" height="76" rx="18" fill="#07101C" fill-opacity="0.62" stroke="url(#accent)" stroke-opacity="0.8"/>
  <text x="124" y="590" class="label small code">VPCM.predict(patient_h5ad, intervention, clinical_covariates) -> signed report or refusal</text>
</svg>

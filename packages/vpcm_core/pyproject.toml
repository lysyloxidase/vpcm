[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-core"
version = "0.1.0"
description = "Core governance, reproducibility, provenance, and typed schemas for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "cryptography>=42",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
ml = ["numpy>=1.26", "torch>=2.5"]
provenance = ["dvc>=3.58", "lamindb>=0.77"]
signing = ["cryptography>=42"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_core"]


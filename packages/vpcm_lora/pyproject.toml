[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-lora"
version = "0.4.0"
description = "Patient-specific LoRA adapters for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = [
  "vpcm-core==0.1.0",
  "vpcm-data==0.1.0",
  "vpcm-models==0.2.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "cryptography>=42",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
peft = ["accelerate>=1.0", "peft>=0.13", "torch>=2.5", "transformers>=4.48"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_lora"]


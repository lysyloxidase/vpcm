[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-conformal"
version = "0.4.0"
description = "FDA-grade conformal uncertainty quantification for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = ["vpcm-core==0.1.0"]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
mapie = ["mapie>=0.9", "numpy>=1.26", "scikit-learn>=1.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_conformal"]


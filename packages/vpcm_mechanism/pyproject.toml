[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-mechanism"
version = "0.5.0"
description = "Mechanism-of-action interpretation heads for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = [
  "vpcm-core==0.1.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "cryptography>=42",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
bio = ["decoupler>=1.8", "liana>=1.4", "scanpy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_mechanism"]


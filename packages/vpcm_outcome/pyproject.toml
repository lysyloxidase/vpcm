[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-outcome"
version = "0.6.0"
description = "Outcome prediction heads for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = [
  "vpcm-core==0.1.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "cryptography>=42",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
pycox = ["pycox>=0.3", "torchtuples>=0.2", "torch>=2.5"]
multiomics = ["mudata>=0.3", "scanpy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_outcome"]


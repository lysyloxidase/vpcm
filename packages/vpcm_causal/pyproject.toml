[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-causal"
version = "0.3.0"
description = "Do-calculus refusal gate for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = [
  "vpcm-core==0.1.0",
  "vpcm-data==0.1.0",
  "vpcm-models==0.2.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "cryptography>=42",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
math = ["numpy>=1.26", "scipy>=1.13"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_causal"]


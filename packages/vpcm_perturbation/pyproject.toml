[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-perturbation"
version = "0.3.0"
description = "Perturbation predictor ensemble for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "VPCM Contributors" }]
dependencies = [
  "vpcm-baselines==0.2.0",
  "vpcm-core==0.1.0",
  "vpcm-data==0.1.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
deep = ["numpy>=1.26", "torch>=2.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_perturbation"]


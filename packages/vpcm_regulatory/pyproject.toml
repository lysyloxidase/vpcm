[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-regulatory"
version = "1.0.0"
description = "V&V 40 and FDA pre-submission regulatory tooling for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "VPCM Contributors" }]
dependencies = [
  "cryptography>=42",
  "vpcm-core==0.1.0",
  "vpcm-pipeline==0.6.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
reports = ["jinja2>=3.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_regulatory"]

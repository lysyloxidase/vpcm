[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-pipeline"
version = "0.6.0"
description = "End-to-end VPCM prediction pipeline"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "lysyloxidase" }]
dependencies = [
  "cryptography>=42",
  "vpcm-baselines==0.2.0",
  "vpcm-biomarker==0.5.0",
  "vpcm-causal==0.3.0",
  "vpcm-conformal==0.4.0",
  "vpcm-core==0.1.0",
  "vpcm-data==0.1.0",
  "vpcm-lora==0.4.0",
  "vpcm-mechanism==0.5.0",
  "vpcm-models==0.2.0",
  "vpcm-outcome==0.6.0",
  "vpcm-perturbation==0.3.0",
]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
api = ["fastapi>=0.115", "uvicorn>=0.30"]
reports = ["jinja2>=3.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_pipeline"]


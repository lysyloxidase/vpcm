[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "vpcm-models"
version = "0.2.0"
description = "Single-cell foundation model ensemble for VPCM"
readme = "../../README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "VPCM Contributors" }]
dependencies = ["vpcm-core==0.1.0", "vpcm-data==0.1.0"]

[project.optional-dependencies]
dev = [
  "coverage[toml]>=7.6",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pyright>=1.1.390",
  "ruff>=0.8.0",
]
hf = ["accelerate>=1.0", "torch>=2.5", "transformers>=4.48"]

[tool.hatch.build.targets.wheel]
packages = ["src/vpcm_models"]


name: doi-check

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

jobs:
  doi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify DOI references
        run: python scripts/verify_dois.py docs

